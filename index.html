<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دليل مستديم الحاسب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(180deg,#02040c,#071326,#0d2343);
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
padding:35px 15px;
}

.container{
width:100%;
max-width:720px;
}

.profile{
text-align:center;
margin-bottom:35px;
}

.logo{
width:110px;
height:110px;
margin:auto;
border-radius:50%;
background:linear-gradient(135deg,#0f2d63,#08111d);
display:flex;
justify-content:center;
align-items:center;
font-size:48px;
box-shadow:0 0 35px rgba(0,90,255,.45);
margin-bottom:20px;
}

h1{
font-size:34px;
font-weight:700;
}

.subtitle{
margin-top:10px;
color:#b7c9ff;
font-size:18px;
}

.search{
margin:30px 0;
}

.search input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,.08);
color:#fff;
font-size:16px;
backdrop-filter:blur(10px);
}

.search input::placeholder{
color:#b8c7ff;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
margin-bottom:18px;
border-radius:18px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.12);
}

.title{
font-size:20px;
font-weight:700;
}

.join{
text-decoration:none;
background:#1d4fa5;
color:#fff;
padding:12px 26px;
border-radius:14px;
font-weight:700;
transition:.3s;
}

.join:hover{
background:#2b69d3;
}
  </style>

</head>

<body>

<div class="container">

<div class="profile">

<div class="logo">💻</div>

<h1>دليل مستديم الحاسب</h1>

<div class="subtitle">
المستويات
</div>

</div>

<div class="search">

<input
type="text"
id="search"
placeholder="ابحث عن المستوى..."
onkeyup="filterCards()">

</div>

<div class="card">

<div class="title">المستوى الأول</div>

<a class="join"
href="https://t.me/addlist/VcXQ3HdCtURjMTA8"
target="_blank">
دخول
</a>

</div>

<div class="card">

<div class="title">المستوى الثاني</div>

<a class="join"
href="https://t.me/addlist/UZHn4fPZTvI4ODBk"
target="_blank">
دخول
</a>

</div>

<div class="card">

<div class="title">المستوى الثالث</div>

<a class="join"
href="https://t.me/addlist/ltqrujCHbTFjMTFk"
target="_blank">
دخول
</a>

</div>

<div class="card">

<div class="title">المستوى الرابع</div>

<a class="join"
href="https://t.me/addlist/ED-1PugxTU42NjE8"
target="_blank">
دخول
</a>

</div>

<footer>

© دليل مستديم الحاسب

</footer>

</div>
<script>

function filterCards(){

let input=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();

if(text.includes(input)){
card.style.display="flex";
}else{
card.style.display="none";
}

});

}

</script>

</body>

</html>
