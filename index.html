<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الحاسب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131926;
            --primary-blue: #00bcd4;
            --primary-hover: #00e5ff;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --btn-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 100px 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top, rgba(0, 188, 212, 0.15) 0%, transparent 60%);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            color: var(--primary-blue);
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 188, 212, 0.4);
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* التبويبات الرئيسية (الكلية / المستويات) */
        .main-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 10px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            padding: 10px 25px;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary-blue);
            font-weight: 700;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-blue);
            box-shadow: 0 0 10px var(--primary-blue);
        }

        /* تبويبات المستويات الفرعية (من 1 إلى 8) */
        .levels-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .level-btn {
            background-color: var(--btn-bg);
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .level-btn.active, .level-btn:hover {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
            color: #000;
            font-weight: 700;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.4);
        }

        /* حاويات المحتوى */
        .content-section {
            display: none;
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease forwards;
        }

        .content-section.active {
            display: block;
        }

        .level-content {
            display: none;
            animation: fadeIn 0.3s ease forwards;
        }

        .level-content.active {
            display: block;
        }

        /* الكروت والقوائم */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #1e293b;
            box-shadow: 0 10px
