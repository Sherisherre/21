<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sherisherre | Telegram Groups</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(180deg,#03050c,#081425,#0d2240);

color:white;

min-height:100vh;

display:flex;

justify-content:center;

padding:40px 15px;

}

.container{

width:100%;
max-width:700px;

}

.profile{

text-align:center;

margin-bottom:35px;

}

.logo{

width:110px;
height:110px;

margin:auto;

border-radius:50%;

background:linear-gradient(135deg,#0c2d67,#06101d);

display:flex;

align-items:center;

justify-content:center;

font-size:42px;

font-weight:700;

box-shadow:0 0 35px rgba(34,96,255,.45);

margin-bottom:20px;

}

h1{

font-size:34px;

letter-spacing:1px;

}

.subtitle{

margin-top:8px;

color:#c9d4ff;

font-size:15px;

}

.search{

margin:25px 0;

}

.search input{

width:100%;

padding:16px;

border:none;

outline:none;

border-radius:16px;

background:rgba(255,255,255,.08);

color:white;

font-size:15px;

backdrop-filter:blur(12px);

}

.search input::placeholder{

color:#b6c2ff;

}

.card{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px 22px;

margin-bottom:16px;

border-radius:18px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

transition:.3s;

}

.card:hover{

transform:translateY(-4px);

background:rgba(255,255,255,.12);

}

.title{

font-size:18px;

font-weight:600;

}

.join{

text-decoration:none;

padding:11px 22px;

border-radius:12px;

background:#163f83;

color:white;

font-weight:600;

transition:.3s;

}

.join:hover{

background:#2559b7;

}

footer{

text-align:center;

margin-top:35px;

color:#9eb0dd;

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="profile">

<div class="logo">S</div>

<h1>Sherisherre</h1>

<div class="subtitle">
Telegram Groups Hub
</div>

</div>

<div class="search">

<input
type="text"
id="search"
placeholder="Search for a subject..."
onkeyup="filterCards()">

</div>

<div class="card">

<div class="title">📘 MATH105</div>

<a class="join"
href="https://t.me/ضع_رابط_القروب"
target="_blank">
Join
</a>

</div>

<div class="card">

<div class="title">⚛️ PHYS115</div>

<a class="join"
href="https://t.me/ضع_رابط_القروب"
target="_blank">
Join
</a>

</div>

<div class="card">

<div class="title">🧪 CHEM101</div>

<a class="join"
href="https://t.me/ضع_رابط_القروب"
target="_blank">
Join
</a>

</div>

<div class="card">

<div class="title">💻 Programming</div>

<a class="join"
href="https://t.me/ضع_رابط_القروب"
target="_blank">
Join
</a>

</div>

<div class="card">

<div class="title">🇬🇧 English</div>

<a class="join"
href="https://t.me/ضع_رابط_القروب"
target="_blank">
Join
</a>

</div>

<footer>

© Sherisherre

</footer>

</div>

<script>

function filterCards(){

let input=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();

card.style.display=text.includes(input)?"flex":"none";

});

}

</script>

</body>

</html>
