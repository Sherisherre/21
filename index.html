<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الحاسب</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #00d2ff;
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --text-color: #ffffff;
            --secondary-text: #8b949e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            background-image: radial-gradient(var(--primary-blue) 0.5px, transparent 0.5px);
            background-size: 30px 30px; /* خلفية النقاط */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            flex: 1;
        }

        h1 {
            font-size: 3rem;
            color: var(--primary-blue);
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--secondary-text);
            margin-bottom: 40px;
        }

        /* نظام التبويبات الرئيسي */
        .main-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--secondary-text);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 10px 20px;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary-blue);
            border-bottom: 2px solid var(--primary-blue);
        }

        /* نظام تبويبات المستويات */
        .levels-nav {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .level-btn {
            background: var(--card-bg);
            border: 1px solid #30363d;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .level-btn.active {
            background: var(--primary-blue);
            color: black;
            font-weight: bold;
        }

        /* البطاقات */
        .content-section {
            display: none;
            justify-content: center;
        }

        .content-section.active {
            display: flex;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .group-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--secondary-text);
            margin: 15px 0 10px;
            font-size: 0.9rem;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            margin: 10px 0;
            border-radius: 50px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .link-button:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--primary-blue);
        }

        /* الفوتر */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0,0,0,0.3);
            margin-top: 50px;
        }

        .footer-left a {
            color: var(--primary-blue);
            font-size: 1.5rem;
            text-decoration: none;
        }

        .footer-right {
            font-weight: bold;
            color: var(--secondary-text);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .main-tabs { flex-direction: row; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>دليل الحاسب</h1>
        <p class="subtitle">وصول سريع ومنظم لجميع روابط القنوات والمبادرات الطلابية</p>

        <!-- التبويبات الرئيسية -->
        <div class="main-tabs">
            <button class="tab-btn active" onclick="showTab('college')">الكلية</button>
            <button class="tab-btn" onclick="showTab('levels')">المستويات</button>
        </div>

        <!-- أرقام المستويات (تظهر فقط عند الضغط على المستويات) -->
        <div id="levels-nav" class="levels-nav">
            <button class="level-btn active" onclick="showLevel(1)">الأول</button>
            <button class="level-btn" onclick="showLevel(2)">الثاني</button>
            <button class="level-btn" onclick="showLevel(3)">الثالث</button>
            <button class="level-btn" onclick="showLevel(4)">الرابع</button>
            <button class="level-btn" onclick="showLevel(5)">الخامس</button>
            <button class="level-btn" onclick="showLevel(6)">السادس</button>
            <button class="level-btn" onclick="showLevel(7)">السابع</button>
            <button class="level-btn" onclick="showLevel(8)">الثامن</button>
        </div>

        <!-- محتوى الكلية -->
        <div id="college-content" class="content-section active">
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-users" style="color: var(--primary-blue);"></i>
                    قروبات كلية الحاسب
                </div>
                
                <a href="https://t.me/qassimuniversityc" target="_blank" class="link-button">
                    <span>قناة كلية الحاسب</span>
                    <i class="fas fa-bullhorn"></i>
                </a>
                <a href="https://t.me/qassimuniversityIT" target="_blank" class="link-button">
                    <span>مناقشة كلية الحاسب</span>
                    <i class="fas fa-comments"></i>
                </a>

                <div class="group-header">
                    <i class="fas fa-users-items"></i> حوسب
                </div>
                <a href="https://t.me/COC_QU_channel" target="_blank" class="link-button">
                    <span>قناة حوسب</span>
                    <i class="fas fa-bullhorn"></i>
                </a>
                <a href="https://t.me/COC_QU" target="_blank" class="link-button">
                    <span>مناقشة حوسب</span>
                    <i class="fas fa-comments"></i>
                </a>
            </div>
        </div>

        <!-- محتوى المستويات -->
        <div id="levels-content" class="content-section">
            <!-- سيتم تبديل المحتوى هنا بواسطة JS -->
            <div id="level-display" class="card">
                <!-- المحتوى المتغير يوضع هنا -->
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-left">
            <a href="https://t.me/Sherisherre" target="_blank"><i class="fab fa-telegram"></i></a>
        </div>
        <div class="footer-right">
            Sherisherre
        </div>
    </footer>

    <script>
        const levelsData = {
            1: {
                title: "المستوى الأول",
                mustadeem: "https://t.me/addlist/LH-wE8fs_4ExNjE0",
                hawsibChannel: "https://t.me/hawsib1",
                hawsibChat: "https://t.me/hawsib_1"
            },
            2: {
                title: "المستوى الثاني",
                mustadeem: "https://t.me/addlist/UZHn4fPZTvI4ODBk",
                hawsibChannel: "https://t.me/hawsib2",
                hawsibChat: "https://t.me/hawsib2"
            },
            3: {
                title: "المستوى الثالث",
                mustadeem: "https://t.me/addlist/WY-nb6Wz4EtkYjZk",
                hawsibChannel: "https://t.me/hawsib3",
                hawsibChat: "https://t.me/hawsib_3"
            },
            4: {
                title: "المستوى الرابع",
                mustadeem: "https://t.me/addlist/ED-1PugxTU42NjE8",
                hawsibChannel: "https://t.me/hawsib3", // كما ورد في طلبك
                hawsibChat: "https://t.me/hawsib4"
            },
            5: {
                title: "المستوى الخامس",
                isMoves: true,
                moves: [
                    { name: "Moves IT", link: "https://t.me/IT_5_moves" },
                    { name: "Moves CS", link: "https://t.me/Brightofcs5" },
                    { name: "Moves CE", link: "https://t.me/CEGOATS/1" }
                ],
                hawsibChannel: "https://t.me/hawsib5",
                hawsibChat: "https://t.me/hawsib_5"
            },
            6: {
                title: "المستوى السادس",
                isMoves: true,
                moves: [{ name: "Moves جميع التخصصات", link: "https://t.me/COC_6_moves" }],
                hawsibChannel: "https://t.me/hawsib6",
                hawsibChat: "https://t.me/hawsib_6"
            },
            7: {
                title: "المستوى السابع",
                isMoves: true,
                onlyMoves: true,
                moves: [{ name: "Moves جميع التخصصات", link: "https://t.me/COC_7_moves" }]
            },
            8: {
                title: "المستوى الثامن",
                isMoves: true,
                onlyMoves: true,
                moves: [{ name: "Moves جميع التخصصات", link: "https://t.me/COC_8_moves" }]
            }
        };

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            
            if(tab === 'college') {
                document.getElementById('college-content').classList.add('active');
                document.getElementById('levels-nav').style.display = 'none';
                event.target.classList.add('active');
            } else {
                document.getElementById('levels-content').classList.add('active');
                document.getElementById('levels-nav').style.display = 'flex';
                event.target.classList.add('active');
                showLevel(1); // افتراضياً المستوى الأول
            }
        }

        function showLevel(num) {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            const data = levelsData[num];
            let html = `<div class="card-title"><i class="fas fa-layer-group" style="color: var(--primary-blue);"></i> ${data.title}</div>`;
            
            if (data.isMoves) {
                html += `<div class="group-header"><i class="fas fa-link"></i> Moves</div>`;
                data.moves.forEach(m => {
                    html += `<a href="${m.link}" target="_blank" class="link-button"><span>${m.name}</span><i class="fas fa-link"></i></a>`;
                });
            } else {
                html += `<div class="group-header"><i class="fas fa-link"></i> قنوات مستديم</div>`;
                html += `<a href="${data.mustadeem}" target="_blank" class="link-button"><span>مستديم</span><i class="fas fa-star"></i></a>`;
            }

            if (!data.onlyMoves) {
                html += `<div class="group-header"><i class="fas fa-users-items"></i> حوسب</div>`;
                html += `<a href="${data.hawsibChannel}" target="_blank" class="link-button"><span>قناة المستوى ${data.title.split(' ')[1]}</span><i class="fas fa-bullhorn"></i></a>`;
                html += `<a href="${data.hawsibChat}" target="_blank" class="link-button"><span>مناقشة المستوى ${data.title.split(' ')[1]}</span><i class="fas fa-comments"></i></a>`;
            }

            document.getElementById('level-display').innerHTML = html;
        }
    </script>
</body>
</html>
