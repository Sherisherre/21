<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الحاسب</title>
    <!-- استيراد الأيقونات والخطوط -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* تعريف المتغيرات للتحكم باللون الأزرق والوضع الليلي */
        :root {
            --primary-blue: #00d2ff; /* اللون الأزرق الرهيب */
            --bg-body: #0b0e11;
            --bg-card: #161b22;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --item-bg: rgba(255, 255, 255, 0.05);
            --glow: rgba(0, 210, 255, 0.3);
        }

        /* الوضع النهاري */
        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #1c1e21;
            --text-dim: #606770;
            --border-color: #d1d5db;
            --item-bg: #f9fafb;
            --glow: rgba(0, 210, 255, 0.1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            transition: 0.3s;
        }
